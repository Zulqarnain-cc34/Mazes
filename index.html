<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Maze Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />

    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #fdfdfd;
        font-family: system-ui, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px 0;
      }

      canvas {
        box-shadow: 0 5px 30px 0 rgba(0, 0, 0, 0.1);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* Styled select ─────────────────── */
      .select-group {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-family: monospace;
        color: #555;
      }

      select {
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
        font-family: monospace;
        color: #1a1a2e;
        cursor: pointer;
        outline: none;
      }

      select:focus { border-color: #4e9af1; }

      /* Upload button ──────────────────── */
      .upload-btn {
        display: inline-block;
        padding: 7px 16px;
        background: #1a1a2e;
        color: #eaeaea;
        border-radius: 6px;
        font-size: 13px;
        font-family: monospace;
        cursor: pointer;
      }
      .upload-btn:hover { background: #2e2e52; }

      input[type="file"] { display: none; }

      /* Export button ──────────────────── */
      .export-btn {
        padding: 7px 16px;
        background: #27ae60;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-family: monospace;
        cursor: pointer;
      }
      .export-btn:hover { background: #219150; }

      /* Sliders ───────────────────────── */
      .slider-group {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-family: monospace;
        color: #555;
      }

      input[type="range"] {
        width: 110px;
        cursor: pointer;
        accent-color: #1a1a2e;
      }

      .hint {
        font-size: 11px;
        color: #aaa;
        font-family: monospace;
      }

      /* Divider ───────────────────────── */
      .sep {
        color: #ddd;
        font-size: 18px;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <div class="controls">

      <!-- Algorithm selector: adding a new generator only requires a new <option> here
           and a corresponding class in board.js + branch in initMaze() in sketch.js -->
      <div class="select-group">
        <span>Algorithm:</span>
        <select id="algorithm">
          <option value="prims">Prim's</option>
          <option value="dfs">DFS (Backtracker)</option>
        </select>
      </div>

      <span class="sep">|</span>

      <label class="upload-btn" for="imgInput">Upload Image</label>
      <input type="file" id="imgInput" accept="image/*" />

      <div class="slider-group">
        <span>Resolution:</span>
        <input type="range" id="resolution" min="5" max="200" value="25" />
        <span id="resolutionValue">25×25</span>
      </div>

      <div class="slider-group">
        <span>Threshold:</span>
        <input type="range" id="threshold" min="0" max="255" value="128" />
        <span id="thresholdValue">128</span>
      </div>

      <span class="sep">|</span>

      <button class="export-btn" onclick="saveCanvas('maze','png')">Export PNG</button>

    </div>

    <span class="hint">Dark pixels = maze cells &nbsp;|&nbsp; White = excluded &nbsp;|&nbsp; Click canvas to set start / end</span>

    <!-- Scripts at end of body so the DOM is fully parsed before setup() runs -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
    <script src="board.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
